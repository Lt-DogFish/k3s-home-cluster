# manifests/kube-system/metrics-server.yaml
# k3s homelab metrics-server deployment
# Notes:
# - --kubelet-insecure-tls: required for k3s nodes with self-signed certificates
# - --kubelet-preferred-address-types: ensures metrics-server talks to the right IP (InternalIP preferred)
# - Place this file in your Git repo under manifests/kube-system/

apiVersion: v1
kind: Namespace
metadata:
  name: kube-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-server
  namespace: kube-system
  labels:
    k8s-app: metrics-server
spec:
  selector:
    matchLabels:
      k8s-app: metrics-server
  template:
    metadata:
      labels:
        k8s-app: metrics-server
    spec:
      serviceAccountName: metrics-server
      containers:
      - name: metrics-server
        image: k8s.gcr.io/metrics-server/metrics-server:v0.12.0
        args:
        - --kubelet-insecure-tls
        - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
        ports:
        - containerPort: 4443
          name: main-port
